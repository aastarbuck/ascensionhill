
name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened, closed ]
    branches: [ main ]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repo WITH submodules so the Relearn theme is present
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # 2) Install Hugo Extended (explicit + deterministic)
      #    Relearn requires Hugo extended; we’ll pin a recent stable version.
      - name: Install Hugo Extended
        run: |
          HUGO_VERSION=0.124.1
          wget -q https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz
          tar -xzf hugo_extended_${HUGO_VERSION}_Linux-64bit.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      # 3) Build the site (outputs to ./public by default)
      - name: Build Hugo site
        run: |
          hugo --minify

      # 4) Deploy to Azure Static Web Apps
      #    This action uploads the ./public directory as the site artefact.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # Your Hugo site root (where hugo.toml lives)
          app_location: "/"

          # The folder to serve (Hugo’s output)
          output_location: "public"

          # We already built above; skip Oryx’s app build to avoid double builds
          skip_app_build: true
