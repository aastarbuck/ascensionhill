
name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master   # <-- change to "main" if your default branch is main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master   # <-- likewise here, use your real default branch

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      # Ensure the Relearn theme submodule is available during build
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # Install Hugo Extended (peaceiris sets up the correct binary)
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      # Build Hugo site to ./public (default)
      - name: Build Hugo site
        run: hugo --minify

      # Deploy to Azure Static Web Apps
      # Pinned to a commit SHA for reproducibility (recommended by GitHub)
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_FOREST_0A8C17610 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # Hugo site root (where hugo.toml lives)
          app_location: "/"

          # Folder to serve (Hugo output)
          output_location: "public"

          # We already built above; skip Oryx's app build
          skip_app_build: true
